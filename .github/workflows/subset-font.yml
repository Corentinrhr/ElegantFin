name: Generate Subset Font

on:
  workflow_run:
    workflows: ["Auto-Minify Theme CSS"] # must match upstream workflow name
    types:
      - completed
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write # required for push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install fonttools brotli

      - name: Parse CSS and Generate Subset Font
        shell: python
        run: |
          import urllib.request
          import re
          import os
          import subprocess
          
          css_path = "Theme/ElegantFin-jellyfin-theme-build-latest-minified.css"
          with open(css_path, "r", encoding="utf-8") as f:
              css_content = f.read()
              
          unicodes = set(re.findall(r'content\s*:\s*["\']\\([a-fA-F0-9]{4})["\']', css_content))
          unicodes_arg = ",".join([f"U+{u.upper()}" for u in unicodes])
          
          words = set(re.findall(r'content\s*:\s*["\']([a-z_]{3,})["\']', css_content))
          
          # keep core icons to avoid UI breakage
          words.update([
              "home", "settings", "search", "cast", "menu", "close", "play_arrow", 
              "pause", "favorite", "star", "check", "info", "account_circle", 
              "more_vert", "arrow_forward", "arrow_back", "logout", "person", "edit",
              "delete", "refresh", "subtitles", "folder", "sort", "filter_list"
          ])
          
          # pyftsubset expects a flat char set
          text_arg = "".join(set("".join(words)))
          
          urllib.request.urlretrieve(
              "https://fonts.gstatic.com/s/materialsymbolsrounded/v325/sykO-zNym6YjUruM-QrEh7-nyTnjDwKNJ_190FjpZIvLgyidOK7BDB_Qb9vUdV6_gjDK-P3JuEXX.woff2",
              "base.woff2"
          )
          
          os.makedirs("Theme/assets/font", exist_ok=True)
          
          cmd = [
              "pyftsubset", "base.woff2",
              "--flavor=woff2",
              "--output-file=Theme/assets/font/material-symbols-jellyfin.woff2",
              "--layout-features=liga,clig,rlig",
              "--no-layout-closure"
          ]
          
          if unicodes_arg:
              cmd.append(f"--unicodes={unicodes_arg}")
          if text_arg:
              cmd.append(f"--text={text_arg}")
          
          subprocess.run(cmd, check=True)

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate subset material-symbols-jellyfin.woff2"
          file_pattern: "Theme/assets/font/material-symbols-jellyfin.woff2"